<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Todo List</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>⚙ Settings</h1>
            <div class="user-info">
                <a href="{{ url_for('index') }}" class="btn-settings">← Quay lại</a>
            </div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form action="{{ url_for('settings') }}" method="post" class="auth-form">
            <div class="form-group">
                <label for="todoist_token">Todoist API Token</label>
                <input type="text" id="todoist_token" name="todoist_token"
                       value="{{ current_user.todoist_token or '' }}"
                       placeholder="Dán API token từ Todoist...">
            </div>
            <p class="hint">Lấy token tại: Todoist → Settings → Integrations → Developer → API token.</p>
            <button type="submit" class="btn-primary">Lưu</button>
        </form>
    </div>
</body>
</html>
